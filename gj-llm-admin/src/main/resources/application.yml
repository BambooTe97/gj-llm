spring:
  application:
    name: gj-llm

  # ==================== 文件上传配置 ====================
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  # ==================== 数据库配置 ====================
  datasource:
    url: jdbc:mysql://192.168.0.105:3306/gj_llm?useSSL=false&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ==================== MyBatis-Plus 配置 ====================
mybatis-plus:
  # XML 映射文件路径（自定义 SQL 放在 resources/mapper/ 下）
  mapper-locations: classpath*:/mapper/**/*.xml
  # 实体类别名包（在 XML 中可直接使用类名）
  type-aliases-package: com.gj.llm.admin.entity
  configuration:
    # 数据库字段下划线 → Java 属性驼峰自动映射
    map-underscore-to-camel-case: true
    # SQL 日志输出（开发环境可打开）
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      # 主键自增策略
      id-type: auto
      # 逻辑删除字段（当前未启用，预留）
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# ==================== 安全配置 ====================
app:
  security:
    jwt:
      # JWT 签名密钥（Base64 编码，至少 256 bit）
      # 留空时应用自动生成随机密钥（仅开发环境，重启后所有 Token 失效）
      # 生产环境务必配置固定密钥：secret: ${JWT_SECRET}
      secret: ""
      # Access Token 有效期（毫秒），默认 24 小时
      access-token-expiration: 86400000
      # Refresh Token 有效期（毫秒），默认 7 天
      refresh-token-expiration: 604800000
    # 无需认证即可访问的路径（Ant 风格匹配）
    ignore-paths:
      - /api/auth/login
      - /api/auth/refresh

  # ==================== 文件管理配置 ====================
  file:
    # 文件存储根目录
    upload-dir: E:/work/ai/gj-llm/uploads
    # 前端访问文件的 URL 前缀（Spring MVC 静态资源映射 + Vite 代理）
    serve-path: /files
    # 单个文件最大大小（字节），默认 100MB
    max-file-size: 104857600
    # 允许上传的文件扩展名
    allowed-extensions:
      - pdf
      - doc
      - docx
      - txt
      - md
      - png
      - jpg
      - jpeg
      - gif
      - csv
      - xls
      - xlsx
      - ppt
      - pptx
