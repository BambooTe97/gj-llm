app:
  # ==================== 文件管理配置 ====================
  file:
    # 文件存储根目录
    upload-dir: D:\aaone\code\ai\gj-llm/uploads
    # 前端访问文件的 URL 前缀（Spring MVC 静态资源映射 + Vite 代理）
    serve-path: /files
    # 单个文件最大大小（字节），默认 100MB
    max-file-size: 104857600
    # 允许上传的文件扩展名
    allowed-extensions:
      - pdf
      - doc
      - docx
      - txt
      - md
      - png
      - jpg
      - jpeg
      - gif
      - csv
      - xls
      - xlsx
      - ppt
      - pptx